<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E1306C">
<title>FantaC — Camps</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ===== FULL EMBEDDED CSS ===== */
:root {
  --pink: #E1306C;
  --pink-dark: #C13584;
  --purple: #833AB4;
  --orange: #F77737;
  --gradient: linear-gradient(45deg, #833AB4, #E1306C, #F77737);
  --gradient-v: linear-gradient(135deg, #833AB4 0%, #E1306C 50%, #F77737 100%);
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --dark: #262626;
  --mid: #8e8e8e;
  --border: #dbdbdb;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --pink-light: rgba(225,48,108,0.08);
  --radius: 12px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --nav-h: 60px;
  --player-h: 72px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--player-h) + env(safe-area-inset-bottom) + 16px);
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; }

/* Header */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; }
.app-logo span { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.points-pill { background: var(--gradient); color: white; border-radius: 40px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; margin-left: 12px; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 0;
  color: var(--mid);
  transition: var(--transition);
  text-decoration: none;
}
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; font-weight: 500; }
.nav-item.active { color: var(--pink); }
.nav-item.active svg { stroke: var(--pink); }

/* Player Bar */
.player-bar {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 99;
  height: var(--player-h);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.player-art {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  object-fit: cover;
  background: #f3f3f3;
  flex-shrink: 0;
}
.player-info { flex: 1; overflow: hidden; }
.player-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-artist { font-size: 12px; color: var(--mid); }
.player-progress {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
}
.player-progress-fill {
  height: 100%;
  background: var(--gradient);
  transition: width 0.5s linear;
  width: 0%;
}
.player-controls { display: flex; align-items: center; gap: 12px; }
.player-btn { color: var(--dark); font-size: 20px; }
.player-play {
  width: 36px; height: 36px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
}

/* Camps specific */
.camps-hero {
  padding: 20px 16px;
  background: var(--gradient-v);
  color: white;
  position: relative;
  overflow: hidden;
}
.camps-hero::before {
  content: '⛺';
  position: absolute;
  font-size: 100px;
  right: -10px;
  top: -10px;
  opacity: 0.15;
}
.camps-hero-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; }
.camps-hero-sub { font-size: 14px; opacity: 0.8; margin-top: 4px; }
.camps-hero-stats { display: flex; gap: 20px; margin-top: 14px; }
.camps-hero-stat-num { font-size: 20px; font-weight: 800; font-family: var(--font-display); }
.camps-hero-stat-label { font-size: 11px; opacity: 0.7; }

.camp-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 16px;
}
.camp-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.camp-info { flex: 1; }
.camp-name { font-size: 15px; font-weight: 600; }
.camp-members { font-size: 12px; color: var(--mid); margin-top: 2px; }
.camp-badges { margin-top: 6px; }
.badge {
  display: inline-block;
  background: var(--pink-light);
  color: var(--pink);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
}
.avatar { border-radius: 50%; object-fit: cover; }
.btn-outline {
  background: transparent;
  color: var(--pink);
  border: 1.5px solid var(--pink);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-outline:hover { background: var(--pink-light); }

/* Full Player (simplified) */
.full-player {
  position: fixed;
  inset: 0;
  background: var(--white);
  z-index: 500;
  display: none;
  flex-direction: column;
}
.full-player.open { display: flex; }
.full-player-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
.full-player-header button { font-size: 24px; color: var(--dark); }
.full-player-art { width: 260px; height: 260px; border-radius: 20px; object-fit: cover; margin: 20px auto; }
.full-player-meta { text-align: center; padding: 0 24px 20px; }
.full-player-title { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
.full-player-artist { font-size: 15px; color: var(--mid); }
.full-player-progress { padding: 0 24px 20px; }
.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
.progress-fill { height: 100%; background: var(--gradient); border-radius: 2px; width: 0%; }
.progress-times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--mid); }
.full-player-controls { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 0 24px; }
.full-player-btn { font-size: 26px; color: var(--mid); cursor: pointer; }
.full-player-play {
  width: 64px; height: 64px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: white;
  cursor: pointer;
}
.full-player-extras { display: flex; align-items: center; justify-content: space-around; padding: 20px 24px 0; }
.full-player-extra { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: var(--mid); cursor: pointer; }

/* Toast */
.toast-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: calc(100% - 32px);
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--dark);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.success { background: #10b981; }
.toast.error { background: #EF4444; }
.toast.info { background: var(--pink); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

.flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>

<div class="app-header flex-between">
  <div class="app-logo">Fanta<span>C</span></div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <span class="points-pill" id="user-points-badge">⭐ 0</span>
    <div id="user-avatar-header" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; cursor: pointer;" onclick="location.href='profile.html'">
      <img src="" style="width:100%;height:100%;object-fit:cover;">
    </div>
  </div>
</div>

<div class="page">
  <div class="camps-hero">
    <div class="camps-hero-title">⛺ Artist Camps</div>
    <div class="camps-hero-sub">Join your favorite artist's community</div>
    <div class="camps-hero-stats">
      <div><div class="camps-hero-stat-num" id="total-camps">0</div><div class="camps-hero-stat-label">Camps</div></div>
      <div><div class="camps-hero-stat-num" id="total-campers">0</div><div class="camps-hero-stat-label">Campers</div></div>
    </div>
  </div>
  <div id="camps-list" class="camp-grid"></div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5M5 10v8a2 2 0 002 2h10a2 2 0 002-2v-8"/></svg><span>Home</span></a>
  <a href="explore.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/></svg><span>Explore</span></a>
  <a href="camps.html" class="nav-item active"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16h5"/><path d="M12 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"/></svg><span>Camps</span></a>
  <a href="giveaway.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8M12 2v12m0 0-2-2m2 2 2-2M2 7h20v4H2z"/></svg><span>Giveaways</span></a>
  <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
</div>

<div id="player-bar" class="player-bar" style="display: none;">
  <img id="bar-art" class="player-art" src="">
  <div class="player-info">
    <div id="bar-title" class="player-title">-</div>
    <div id="bar-artist" class="player-artist">-</div>
  </div>
  <div class="player-controls">
    <button id="bar-prev" class="player-btn">⏮</button>
    <button id="bar-play" class="player-play">▶</button>
    <button id="bar-next" class="player-btn">⏭</button>
  </div>
  <div class="player-progress"><div id="bar-progress-fill" class="player-progress-fill"></div></div>
</div>

<div id="full-player" class="full-player">
  <div class="full-player-header"><button id="fp-close">✕</button><div></div><button id="fp-more">⋮</button></div>
  <img id="fp-art" class="full-player-art" src="">
  <div class="full-player-meta"><div id="fp-title" class="full-player-title">-</div><div id="fp-artist" class="full-player-artist">-</div></div>
  <div class="full-player-progress"><div id="fp-progress-bar" class="progress-bar"><div id="fp-progress-fill" class="progress-fill"></div></div><div class="progress-times"><span id="fp-current">0:00</span><span id="fp-duration">0:00</span></div></div>
  <div class="full-player-controls"><button id="fp-prev" class="full-player-btn">⏮</button><button id="fp-play" class="full-player-play">▶</button><button id="fp-next" class="full-player-btn">⏭</button></div>
  <div class="full-player-extras"><div id="fp-like" class="full-player-extra">🤍</div><div id="fp-repeat" class="full-player-extra">🔁</div><div id="fp-shuffle" class="full-player-extra">🔀</div></div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- Firebase modular SDK -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion, arrayRemove, increment, getDoc } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyADh-PXSVsKcisJvJqIkLnjIGRhpR0ymw",
    authDomain: "fantac-dc759.firebaseapp.com",
    projectId: "fantac-dc759",
    storageBucket: "fantac-dc759.firebasestorage.app",
    messagingSenderId: "26720948797",
    appId: "1:26720948797:web:f6b7c336ee9741c668d054"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let campsData = [];

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    container.appendChild(t);
    setTimeout(() => {
      t.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function formatNum(n) {
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toString();
  }

  // Load current user points & avatar
  async function loadUserUI(uid) {
    const userDoc = await getDoc(doc(db, 'users', uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      document.getElementById('user-points-badge').innerHTML = `⭐ ${formatNum(data.points || 0)}`;
      const avatarImg = document.querySelector('#user-avatar-header img');
      avatarImg.src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName || 'U')}&background=E1306C&color=fff`;
    }
  }

  // Update camp UI after join/leave
  async function renderCamps() {
    const container = document.getElementById('camps-list');
    if (!container) return;
    container.innerHTML = '';
    let totalMembers = 0;
    for (const camp of campsData) {
      const isJoined = camp.members?.includes(currentUser?.uid) || false;
      const memberCount = camp.members?.length || 0;
      totalMembers += memberCount;
      const card = document.createElement('div');
      card.className = 'camp-card';
      card.innerHTML = `
        <img class="avatar" style="width:56px;height:56px;border-radius:50%;" src="${camp.avatar || 'https://picsum.photos/seed/default/100/100'}" alt="${camp.name}">
        <div class="camp-info">
          <div class="camp-name">${camp.name}</div>
          <div class="camp-members">👥 ${formatNum(memberCount)} members</div>
          <div class="camp-badges">${camp.official ? '<span class="badge">Official</span>' : ''}</div>
        </div>
        <button class="btn-outline join-camp-btn" data-id="${camp.id}" data-name="${camp.name}" data-joined="${isJoined}">${isJoined ? 'Joined ✓' : 'Join'}</button>
      `;
      container.appendChild(card);
    }
    document.getElementById('total-camps').textContent = campsData.length;
    document.getElementById('total-campers').textContent = formatNum(totalMembers);
    // Attach event listeners to buttons
    document.querySelectorAll('.join-camp-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const campId = btn.dataset.id;
        const campName = btn.dataset.name;
        const currentlyJoined = btn.dataset.joined === 'true';
        if (currentlyJoined) {
          await leaveCamp(campId, campName);
        } else {
          await joinCamp(campId, campName);
        }
      });
    });
  }

  async function joinCamp(campId, campName) {
    if (!currentUser) return;
    try {
      const campRef = doc(db, 'camps', campId);
      const userRef = doc(db, 'users', currentUser.uid);
      // Update camp: add user to members array, increment memberCount
      await updateDoc(campRef, {
        members: arrayUnion(currentUser.uid),
        memberCount: increment(1)
      });
      // Update user: add camp to joinedCamps, increment campsJoined and points
      await updateDoc(userRef, {
        joinedCamps: arrayUnion(campId),
        campsJoined: increment(1),
        points: increment(25)
      });
      showToast(`Joined ${campName}! +25 points 🎉`, 'success');
      // Refresh camps data
      await loadCamps();
      await loadUserUI(currentUser.uid);
    } catch (error) {
      console.error('Join camp error:', error);
      showToast('Failed to join camp', 'error');
    }
  }

  async function leaveCamp(campId, campName) {
    if (!currentUser) return;
    try {
      const campRef = doc(db, 'camps', campId);
      const userRef = doc(db, 'users', currentUser.uid);
      await updateDoc(campRef, {
        members: arrayRemove(currentUser.uid),
        memberCount: increment(-1)
      });
      await updateDoc(userRef, {
        joinedCamps: arrayRemove(campId),
        campsJoined: increment(-1)
      });
      showToast(`Left ${campName}`, 'info');
      await loadCamps();
      await loadUserUI(currentUser.uid);
    } catch (error) {
      console.error('Leave camp error:', error);
      showToast('Failed to leave camp', 'error');
    }
  }

  async function loadCamps() {
    try {
      const querySnapshot = await getDocs(collection(db, 'camps'));
      const camps = [];
      querySnapshot.forEach(docSnap => {
        const data = docSnap.data();
        camps.push({
          id: docSnap.id,
          name: data.name,
          description: data.description,
          members: data.members || [],
          memberCount: data.memberCount || 0,
          official: data.official || false,
          avatar: data.avatar || 'https://picsum.photos/seed/camp_default/100/100'
        });
      });
      if (camps.length === 0) {
        // Fallback sample camps if none exist in Firestore
        const sampleCamps = [
          { id: 'c1', name: 'African Giant Camp', members: ['demo1'], memberCount: 128000, official: true, avatar: 'https://picsum.photos/seed/camp_burna/100/100' },
          { id: 'c2', name: 'Celestial Camp', members: ['demo2'], memberCount: 98000, official: true, avatar: 'https://picsum.photos/seed/camp_ayra/100/100' },
          { id: 'c3', name: 'Ravers Camp', members: [], memberCount: 76000, official: true, avatar: 'https://picsum.photos/seed/camp_rema/100/100' },
          { id: 'c4', name: 'Starboy Nation', members: [], memberCount: 215000, official: true, avatar: 'https://picsum.photos/seed/camp_wiz/100/100' }
        ];
        campsData = sampleCamps;
      } else {
        campsData = camps;
      }
      await renderCamps();
    } catch (error) {
      console.error('Load camps error:', error);
      showToast('Failed to load camps. Using demo data.', 'error');
      // fallback demo
      campsData = [
        { id: 'c1', name: 'African Giant Camp', members: ['demo1'], memberCount: 128000, official: true, avatar: 'https://picsum.photos/seed/camp_burna/100/100' },
        { id: 'c2', name: 'Celestial Camp', members: ['demo2'], memberCount: 98000, official: true, avatar: 'https://picsum.photos/seed/camp_ayra/100/100' }
      ];
      renderCamps();
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    await loadUserUI(user.uid);
    await loadCamps();
  });
</script>
</body>
</html>
