<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E1306C">
<title>FantaC — Explore</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ===== FULL EMBEDDED CSS ===== */
:root {
  --pink: #E1306C;
  --pink-dark: #C13584;
  --purple: #833AB4;
  --orange: #F77737;
  --gradient: linear-gradient(45deg, #833AB4, #E1306C, #F77737);
  --gradient-v: linear-gradient(135deg, #833AB4 0%, #E1306C 50%, #F77737 100%);
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --dark: #262626;
  --mid: #8e8e8e;
  --border: #dbdbdb;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --pink-light: rgba(225,48,108,0.08);
  --radius: 12px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --nav-h: 60px;
  --player-h: 72px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--player-h) + env(safe-area-inset-bottom) + 16px);
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; }

/* Header */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; }
.app-logo span { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.points-pill { background: var(--gradient); color: white; border-radius: 40px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; margin-left: 12px; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 0;
  color: var(--mid);
  transition: var(--transition);
  text-decoration: none;
}
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; font-weight: 500; }
.nav-item.active { color: var(--pink); }
.nav-item.active svg { stroke: var(--pink); }

/* Player Bar */
.player-bar {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 99;
  height: var(--player-h);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.player-art {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  object-fit: cover;
  background: #f3f3f3;
  flex-shrink: 0;
}
.player-info { flex: 1; overflow: hidden; }
.player-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-artist { font-size: 12px; color: var(--mid); }
.player-progress {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
}
.player-progress-fill {
  height: 100%;
  background: var(--gradient);
  transition: width 0.5s linear;
  width: 0%;
}
.player-controls { display: flex; align-items: center; gap: 12px; }
.player-btn { color: var(--dark); font-size: 20px; }
.player-play {
  width: 36px; height: 36px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
}

/* Explore specific */
.explore-header {
  background: var(--gradient-v);
  padding: 24px 16px;
  color: white;
  border-radius: 0 0 24px 24px;
  margin-bottom: 16px;
}
.explore-header h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.explore-header p { opacity: 0.85; font-size: 14px; }
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 40px;
  padding: 8px 16px;
  margin-top: 12px;
}
.search-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.7); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 8px;
}
.section-title { font-size: 17px; font-weight: 700; font-family: var(--font-display); }
.section-link { font-size: 13px; color: var(--pink); font-weight: 600; cursor: pointer; }

.explore-categories {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 16px 12px;
}
.explore-categories::-webkit-scrollbar { display: none; }
.category-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  color: var(--mid);
  background: var(--white);
  cursor: pointer;
}
.category-chip.active { background: var(--gradient); color: white; border-color: transparent; }

.h-scroll {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 0 16px;
  scroll-snap-type: x mandatory;
}
.h-scroll::-webkit-scrollbar { display: none; }
.trending-card {
  flex-shrink: 0;
  width: 140px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--white);
}
.trending-img { height: 100px; background: var(--gradient-v); overflow: hidden; }
.trending-img img { width: 100%; height: 100%; object-fit: cover; }
.trending-body { padding: 8px 10px; }
.trending-name { font-size: 13px; font-weight: 700; }
.trending-count { font-size: 11px; color: var(--mid); }

.camp-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px;
}
.camp-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  cursor: pointer;
}
.camp-info { flex: 1; }
.camp-name { font-size: 14px; font-weight: 600; }
.camp-members { font-size: 11px; color: var(--mid); }
.badge {
  display: inline-block;
  background: var(--pink-light);
  color: var(--pink);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  margin-top: 4px;
}
.btn-outline {
  background: transparent;
  color: var(--pink);
  border: 1.5px solid var(--pink);
  border-radius: 30px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.avatar { border-radius: 50%; object-fit: cover; }

.track-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.track-item:hover { background: var(--pink-light); }
.track-art { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; }
.track-info { flex: 1; }
.track-title { font-size: 14px; font-weight: 600; }
.track-artist { font-size: 12px; color: var(--mid); }
.track-duration { font-size: 12px; color: var(--mid); }
.track-num { width: 24px; text-align: center; font-size: 12px; color: var(--mid); }

/* Full Player (simplified) */
.full-player {
  position: fixed;
  inset: 0;
  background: var(--white);
  z-index: 500;
  display: none;
  flex-direction: column;
}
.full-player.open { display: flex; }
.full-player-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
.full-player-header button { font-size: 24px; color: var(--dark); }
.full-player-art { width: 260px; height: 260px; border-radius: 20px; object-fit: cover; margin: 20px auto; }
.full-player-meta { text-align: center; padding: 0 24px 20px; }
.full-player-title { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
.full-player-artist { font-size: 15px; color: var(--mid); }
.full-player-progress { padding: 0 24px 20px; }
.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
.progress-fill { height: 100%; background: var(--gradient); border-radius: 2px; width: 0%; }
.progress-times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--mid); }
.full-player-controls { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 0 24px; }
.full-player-btn { font-size: 26px; color: var(--mid); cursor: pointer; }
.full-player-play {
  width: 64px; height: 64px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: white;
  cursor: pointer;
}
.full-player-extras { display: flex; align-items: center; justify-content: space-around; padding: 20px 24px 0; }
.full-player-extra { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: var(--mid); cursor: pointer; }

/* Toast */
.toast-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: calc(100% - 32px);
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--dark);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.success { background: #10b981; }
.toast.error { background: #EF4444; }
.toast.info { background: var(--pink); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

.flex-between { display: flex; align-items: center; justify-content: space-between; }
.mt-8 { margin-top: 8px; }
</style>
</head>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",

    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, getDocs, doc, getDoc, query, limit } from "firebase/firestore";

  // Firebase config (your real project)
  const firebaseConfig = {
    apiKey: "AIzaSyADh-PXSVsKcisJvJqIkLnjIGRhpR0ymw",
    authDomain: "fantac-dc759.firebaseapp.com",
    projectId: "fantac-dc759",
    storageBucket: "fantac-dc759.firebasestorage.app",
    messagingSenderId: "26720948797",
    appId: "1:26720948797:web:f6b7c336ee9741c668d054"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let audio = null; // simple player
  let currentTrackSrc = null;

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    container.appendChild(t);
    setTimeout(() => {
      t.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function formatNum(n) {
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
    return n.toString();
  }

  // Simple audio player
  function initPlayer() {
    audio = new Audio();
    const playBtn = document.getElementById('bar-play');
    const prevBtn = document.getElementById('bar-prev');
    const nextBtn = document.getElementById('bar-next');
    const barProgress = document.getElementById('bar-progress-fill');
    const fpPlay = document.getElementById('fp-play');
    const fpPrev = document.getElementById('fp-prev');
    const fpNext = document.getElementById('fp-next');
    const fpProgress = document.getElementById('fp-progress-fill');
    const fpCurrent = document.getElementById('fp-current');
    const fpDuration = document.getElementById('fp-duration');
    const fpClose = document.getElementById('fp-close');
    const fullPlayer = document.getElementById('full-player');
    const bar = document.getElementById('player-bar');

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        if (barProgress) barProgress.style.width = percent + '%';
        if (fpProgress) fpProgress.style.width = percent + '%';
        if (fpCurrent) fpCurrent.textContent = formatDuration(audio.currentTime);
      }
    });
    audio.addEventListener('loadedmetadata', () => {
      if (fpDuration) fpDuration.textContent = formatDuration(audio.duration);
    });
    audio.addEventListener('ended', () => {
      if (playBtn) playBtn.textContent = '▶';
      if (fpPlay) fpPlay.textContent = '▶';
    });
    function formatDuration(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }
    function togglePlay() {
      if (!audio.src || audio.src === window.location.href) {
        showToast('Select a track to play', 'info');
        return;
      }
      if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        fpPlay.textContent = '⏸';
      } else {
        audio.pause();
        playBtn.textContent = '▶';
        fpPlay.textContent = '▶';
      }
    }
    playBtn?.addEventListener('click', togglePlay);
    fpPlay?.addEventListener('click', togglePlay);
    fpClose?.addEventListener('click', () => fullPlayer.classList.remove('open'));
    bar?.addEventListener('click', (e) => {
      if (!e.target.closest('button')) fullPlayer.classList.add('open');
    });
  }

  function playTrack(src, title, artist, cover) {
    if (!audio) initPlayer();
    audio.src = src;
    audio.load();
    audio.play().catch(e => console.log('Play error:', e));
    document.getElementById('bar-title').textContent = title;
    document.getElementById('bar-artist').textContent = artist;
    document.getElementById('bar-art').src = cover;
    document.getElementById('fp-title').textContent = title;
    document.getElementById('fp-artist').textContent = artist;
    document.getElementById('fp-art').src = cover;
    document.getElementById('player-bar').style.display = 'flex';
    const playBtn = document.getElementById('bar-play');
    if (playBtn) playBtn.textContent = '⏸';
    const fpPlayBtn = document.getElementById('fp-play');
    if (fpPlayBtn) fpPlayBtn.textContent = '⏸';
  }

  // Load user points & avatar
  async function loadUserUI(uid) {
    const userDoc = await getDoc(doc(db, 'users', uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      document.getElementById('user-points-badge').innerHTML = `⭐ ${formatNum(data.points || 0)}`;
      const avatarImg = document.querySelector('#user-avatar-header img');
      avatarImg.src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName || 'U')}&background=E1306C&color=fff`;
    }
  }

  // Fallback sample data
  const sampleArtists = [
    { id: 'a1', name: 'Davido', avatar: 'https://picsum.photos/seed/davido_av/200/200', followers: '4.8M', verified: true },
    { id: 'a2', name: 'Burna Boy', avatar: 'https://picsum.photos/seed/burna_av/200/200', followers: '3.2M', verified: true },
    { id: 'a3', name: 'Rema', avatar: 'https://picsum.photos/seed/rema_av/200/200', followers: '1.2M', verified: true }
  ];
  const sampleTracks = [
    { id: 't1', title: 'Timeless', artist: 'Davido', plays: '12.4K', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', cover: 'https://picsum.photos/seed/track1/300/300' },
    { id: 't2', title: 'Calm Down', artist: 'Rema', plays: '9.8K', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', cover: 'https://picsum.photos/seed/track2/300/300' }
  ];
  const sampleCamps = [
    { id: 'c1', name: 'African Giant Camp', artist: 'Burna Boy', members: '128K', avatar: 'https://picsum.photos/seed/camp_burna/100/100', joined: false },
    { id: 'c2', name: 'Celestial Camp', artist: 'Ayra Starr', members: '98K', avatar: 'https://picsum.photos/seed/camp_ayra/100/100', joined: false }
  ];

  async function loadTrendingArtists() {
    const container = document.getElementById('trending-artists');
    container.innerHTML = '';
    let artists = [];
    try {
      const q = query(collection(db, 'artists'), limit(5));
      const snap = await getDocs(q);
      if (!snap.empty) {
        artists = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } else {
        artists = sampleArtists;
      }
    } catch (e) {
      artists = sampleArtists;
    }
    artists.forEach(artist => {
      const card = document.createElement('div');
      card.className = 'trending-card';
      card.onclick = () => location.href = `artist.html?id=${artist.id}`;
      card.innerHTML = `
        <div class="trending-img"><img src="${artist.avatar}" alt="${artist.name}"></div>
        <div class="trending-body">
          <div class="trending-name">${artist.name} ${artist.verified ? '✓' : ''}</div>
          <div class="trending-count">${artist.followers || '0'} followers</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function loadPopularCamps() {
    const container = document.getElementById('popular-camps');
    container.innerHTML = '';
    let camps = [];
    try {
      const snap = await getDocs(collection(db, 'camps'));
      if (!snap.empty) camps = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      else camps = sampleCamps;
    } catch (e) { camps = sampleCamps; }
    camps.slice(0,4).forEach(camp => {
      const card = document.createElement('div');
      card.className = 'camp-card';
      card.onclick = () => location.href = `camps.html?id=${camp.id}`;
      card.innerHTML = `
        <img class="avatar" style="width:50px;height:50px;border-radius:50%;" src="${camp.avatar}" alt="${camp.name}">
        <div class="camp-info">
          <div class="camp-name">${camp.name}</div>
          <div class="camp-members">👥 ${camp.members} members</div>
          <div class="badge">by ${camp.artist}</div>
        </div>
        <button class="btn-outline" onclick="event.stopPropagation(); alert('Join camp: ${camp.name}')">Join</button>
      `;
      container.appendChild(card);
    });
  }

  async function loadTrendingTracks() {
    const container = document.getElementById('trending-tracks');
    container.innerHTML = '';
    let tracks = [];
    try {
      const snap = await getDocs(collection(db, 'tracks'));
      if (!snap.empty) tracks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      else tracks = sampleTracks;
    } catch (e) { tracks = sampleTracks; }
    tracks.slice(0,4).forEach((track, idx) => {
      const trackDiv = document.createElement('div');
      trackDiv.className = 'track-item';
      trackDiv.onclick = () => playTrack(track.src, track.title, track.artist, track.cover);
      trackDiv.innerHTML = `
        <div class="track-num">${idx+1}</div>
        <img class="track-art" src="${track.cover}" alt="${track.title}">
        <div class="track-info">
          <div class="track-title">${track.title}</div>
          <div class="track-artist">${track.artist}</div>
        </div>
        <div class="track-duration">${track.plays || '0'} plays</div>
      `;
      container.appendChild(trackDiv);
    });
  }

  function loadGenres() {
    const genres = ['All', 'Afrobeats', 'Afropop', 'R&B', 'Hip Hop', 'Amapiano'];
    const container = document.getElementById('genre-list');
    container.innerHTML = '';
    genres.forEach(genre => {
      const chip = document.createElement('div');
      chip.className = 'category-chip';
      if (genre === 'All') chip.classList.add('active');
      chip.textContent = genre;
      chip.onclick = () => {
        document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        showToast(`Filtering by ${genre} (demo)`, 'info');
      };
      container.appendChild(chip);
    });
  }

  function setupSearch() {
    const input = document.getElementById('explore-search');
    input.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (query.length >= 2) showToast(`Search: "${query}" (demo)`, 'info');
    });
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    await loadUserUI(user.uid);
    loadGenres();
    await loadTrendingArtists();
    await loadPopularCamps();
    await loadTrendingTracks();
    setupSearch();
    initPlayer();
  });

  // link handlers
  document.getElementById('see-all-artists')?.addEventListener('click', () => showToast('All artists page coming soon', 'info'));
  document.getElementById('view-all-camps')?.addEventListener('click', () => location.href='camps.html');
  document.getElementById('see-all-tracks')?.addEventListener('click', () => showToast('All tracks page coming soon', 'info'));
  document.getElementById('see-all-genres')?.addEventListener('click', () => showToast('All genres coming soon', 'info'));
</script>
</body>
</html>
