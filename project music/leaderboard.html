<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E1306C">
<title>FantaC — Leaderboard</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ===== FULL EMBEDDED CSS ===== */
:root {
  --pink: #E1306C;
  --pink-dark: #C13584;
  --purple: #833AB4;
  --orange: #F77737;
  --gradient: linear-gradient(45deg, #833AB4, #E1306C, #F77737);
  --gradient-v: linear-gradient(135deg, #833AB4 0%, #E1306C 50%, #F77737 100%);
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --dark: #262626;
  --mid: #8e8e8e;
  --border: #dbdbdb;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --pink-light: rgba(225,48,108,0.08);
  --radius: 12px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --nav-h: 60px;
  --player-h: 72px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--player-h) + env(safe-area-inset-bottom) + 16px);
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; }

/* Header */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; }
.app-logo span { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.points-pill { background: var(--gradient); color: white; border-radius: 40px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; margin-left: 12px; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 0;
  color: var(--mid);
  transition: var(--transition);
  text-decoration: none;
}
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; font-weight: 500; }
.nav-item.active { color: var(--pink); }
.nav-item.active svg { stroke: var(--pink); }

/* Player Bar */
.player-bar {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 99;
  height: var(--player-h);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.player-art {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  object-fit: cover;
  background: #f3f3f3;
  flex-shrink: 0;
}
.player-info { flex: 1; overflow: hidden; }
.player-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-artist { font-size: 12px; color: var(--mid); }
.player-progress {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
}
.player-progress-fill {
  height: 100%;
  background: var(--gradient);
  transition: width 0.5s linear;
  width: 0%;
}
.player-controls { display: flex; align-items: center; gap: 12px; }
.player-btn { color: var(--dark); font-size: 20px; }
.player-play {
  width: 36px; height: 36px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
}

/* Leaderboard specific */
.leaderboard-hero {
  padding: 24px 16px 20px;
  background: var(--gradient-v);
  color: white;
  text-align: center;
}
.leaderboard-hero-title { font-family: var(--font-display); font-size: 26px; font-weight: 800; }
.leaderboard-hero-sub { font-size: 14px; opacity: 0.8; margin-top: 4px; }

.podium {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
  padding: 20px 16px;
  background: var(--white);
}
.podium-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.podium-avatar { border-radius: 50%; object-fit: cover; background: #f3f3f3; border: 3px solid transparent; }
.podium-first .podium-avatar { width: 70px; height: 70px; border-color: #F59E0B; }
.podium-second .podium-avatar { width: 58px; height: 58px; border-color: #94A3B8; }
.podium-third .podium-avatar { width: 58px; height: 58px; border-color: #CD7F32; }
.podium-name { font-size: 12px; font-weight: 600; }
.podium-pts { font-size: 11px; color: var(--mid); }
.podium-stand {
  width: 70px;
  border-radius: var(--radius) var(--radius) 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  color: white;
}
.podium-first .podium-stand { height: 60px; background: linear-gradient(135deg, #F59E0B, #FBBF24); }
.podium-second .podium-stand { height: 44px; background: linear-gradient(135deg, #94A3B8, #CBD5E1); }
.podium-third .podium-stand { height: 34px; background: linear-gradient(135deg, #B45309, #D97706); }

.leaderboard-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.leaderboard-rank { width: 28px; text-align: center; font-weight: 700; font-family: var(--font-display); font-size: 16px; }
.leaderboard-rank.rank-1 { color: #F59E0B; }
.leaderboard-rank.rank-2 { color: #94A3B8; }
.leaderboard-rank.rank-3 { color: #CD7F32; }
.avatar { border-radius: 50%; object-fit: cover; }
.leaderboard-info { flex: 1; }
.leaderboard-name { font-size: 14px; font-weight: 600; }
.leaderboard-pts { font-size: 12px; color: var(--mid); }
.leaderboard-score { font-weight: 700; font-size: 15px; color: var(--pink); }

/* Toast */
.toast-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: calc(100% - 32px);
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--dark);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.error { background: #EF4444; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

.flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>

<div class="app-header flex-between">
  <div class="app-logo">Fanta<span>C</span></div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <span class="points-pill" id="user-points-badge">⭐ 0</span>
    <div id="user-avatar-header" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; cursor: pointer;" onclick="location.href='profile.html'">
      <img src="" style="width:100%;height:100%;object-fit:cover;">
    </div>
  </div>
</div>

<div class="page">
  <div class="leaderboard-hero">
    <div class="leaderboard-hero-title">🏆 Leaderboard</div>
    <div class="leaderboard-hero-sub">Top fans this month</div>
  </div>
  <div id="podium" class="podium"></div>
  <div id="leaderboard-list"></div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="home.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5M5 10v8a2 2 0 002 2h10a2 2 0 002-2v-8"/></svg><span>Home</span></a>
  <a href="explore.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/></svg><span>Explore</span></a>
  <a href="camps.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16h5"/><path d="M12 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"/></svg><span>Camps</span></a>
  <a href="giveaway.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8M12 2v12m0 0-2-2m2 2 2-2M2 7h20v4H2z"/></svg><span>Giveaways</span></a>
  <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
</div>

<!-- Player Bar (hidden by default) -->
<div id="player-bar" class="player-bar" style="display: none;">
  <img id="bar-art" class="player-art" src="">
  <div class="player-info">
    <div id="bar-title" class="player-title">-</div>
    <div id="bar-artist" class="player-artist">-</div>
  </div>
  <div class="player-controls">
    <button id="bar-prev" class="player-btn">⏮</button>
    <button id="bar-play" class="player-play">▶</button>
    <button id="bar-next" class="player-btn">⏭</button>
  </div>
  <div class="player-progress"><div id="bar-progress-fill" class="player-progress-fill"></div></div>
</div>

<!-- Full Player Modal (simplified) -->
<div id="full-player" class="full-player" style="display:none;"></div>

<div id="toast-container" class="toast-container"></div>

<!-- Firebase modular SDK -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc } from "firebase/firestore";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyADh-PXSVsKcisJvJqIkLnjIGRhpR0ymw",
    authDomain: "fantac-dc759.firebaseapp.com",
    projectId: "fantac-dc759",
    storageBucket: "fantac-dc759.firebasestorage.app",
    messagingSenderId: "26720948797",
    appId: "1:26720948797:web:f6b7c336ee9741c668d054"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function showToast(msg, type = 'error') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    container.appendChild(t);
    setTimeout(() => {
      t.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function formatNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toString();
  }

  async function loadLeaderboard() {
    try {
      // Get top 20 users by points (descending)
      const usersRef = collection(db, 'users');
      const q = query(usersRef, orderBy('points', 'desc'), limit(20));
      const snapshot = await getDocs(q);
      const leaders = [];
      snapshot.forEach((docSnap, index) => {
        const data = docSnap.data();
        leaders.push({
          rank: index + 1,
          uid: docSnap.id,
          name: data.displayName || 'Anonymous',
          avatar: data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName || 'U')}&background=E1306C&color=fff`,
          points: data.points || 0,
          level: data.level || 1
        });
      });

      // Podium (top 3)
      const podiumDiv = document.getElementById('podium');
      podiumDiv.innerHTML = '';
      const top3 = leaders.slice(0, 3);
      const order = [1, 0, 2]; // visually second, first, third
      order.forEach(idx => {
        const l = top3[idx];
        if (!l) return;
        const pos = idx === 0 ? 'first' : (idx === 1 ? 'second' : 'third');
        podiumDiv.innerHTML += `
          <div class="podium-item podium-${pos}">
            <img class="podium-avatar" src="${l.avatar}" alt="${l.name}">
            <div class="podium-name">${l.name}</div>
            <div class="podium-pts">${formatNum(l.points)} pts</div>
            <div class="podium-stand">${l.rank}</div>
          </div>
        `;
      });

      // Leaderboard list
      const listContainer = document.getElementById('leaderboard-list');
      listContainer.innerHTML = '';
      leaders.forEach(l => {
        const rankClass = l.rank === 1 ? 'rank-1' : (l.rank === 2 ? 'rank-2' : (l.rank === 3 ? 'rank-3' : ''));
        listContainer.innerHTML += `
          <div class="leaderboard-item">
            <div class="leaderboard-rank ${rankClass}">${l.rank}</div>
            <img class="avatar" style="width:44px;height:44px;border-radius:50%;" src="${l.avatar}" alt="${l.name}">
            <div class="leaderboard-info">
              <div class="leaderboard-name">${l.name}</div>
              <div class="leaderboard-pts">Level ${l.level}</div>
            </div>
            <div class="leaderboard-score">${formatNum(l.points)} pts</div>
          </div>
        `;
      });
    } catch (error) {
      console.error('Leaderboard error:', error);
      showToast('Failed to load leaderboard. Using demo data.', 'error');
      // Fallback to demo data if Firestore fails
      const demoLeaders = [
        { rank:1, name:'Amaka_fan', avatar:'https://picsum.photos/seed/lb1/80/80', points:18420, level:25, badge:'👑' },
        { rank:2, name:'MusicKing_NG', avatar:'https://picsum.photos/seed/lb2/80/80', points:15300, level:22, badge:'🥈' },
        { rank:3, name:'Chidora22', avatar:'https://picsum.photos/seed/lb3/80/80', points:12800, level:19, badge:'🥉' }
      ];
      const podiumDiv = document.getElementById('podium');
      podiumDiv.innerHTML = '';
      demoLeaders.slice(0,3).forEach((l, i) => {
        const pos = i===0 ? 'first' : (i===1 ? 'second' : 'third');
        podiumDiv.innerHTML += `<div class="podium-item podium-${pos}"><img class="podium-avatar" src="${l.avatar}"><div class="podium-name">${l.name}</div><div class="podium-pts">${l.points} pts</div><div class="podium-stand">${l.rank}</div></div>`;
      });
      const listContainer = document.getElementById('leaderboard-list');
      listContainer.innerHTML = '';
      demoLeaders.forEach(l => {
        listContainer.innerHTML += `<div class="leaderboard-item"><div class="leaderboard-rank rank-${l.rank}">${l.rank}</div><img class="avatar" style="width:44px;height:44px;border-radius:50%;" src="${l.avatar}"><div class="leaderboard-info"><div class="leaderboard-name">${l.name} ${l.badge}</div><div class="leaderboard-pts">Level ${l.level}</div></div><div class="leaderboard-score">${l.points} pts</div></div>`;
      });
    }
  }

  // Load current user's points and avatar in header
  async function loadUserHeader(uid) {
    try {
      const userDoc = await getDoc(doc(db, 'users', uid));
      if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById('user-points-badge').innerHTML = `⭐ ${formatNum(data.points || 0)}`;
        const avatarImg = document.querySelector('#user-avatar-header img');
        avatarImg.src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName || 'U')}&background=E1306C&color=fff`;
      }
    } catch (e) { console.warn(e); }
  }

  // Auth check
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
    } else {
      loadLeaderboard();
      loadUserHeader(user.uid);
    }
  });
</script>
</body>
</html>
